<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere</title>
        <link rel="stylesheet" href="Css/style.css">
<link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    <header>
<div class="logo">       
 <h1>ShopSphere</h1>
</div>
        <div class="search-box">
            <input type="text" placeholder="Search products...">
            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
          <div class="icons">

            <a href="#">
                <i class="fa-regular fa-user"></i>
            </a>

            <a href="#">
                <i class="fa-regular fa-heart"></i>
            </a>

            <a href="#">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count">0</span>
            </a>

        </div>
    </header>
    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Kids</a>
      <a href="#">Electronics</a>
        <a href="#">Offers</a>
    </nav>
    <section class="hero">
        <div class="hero-content">
<h4>Trending Collection</h4>
<h1>Women's Latest Fashion Sale</h1>
<p>Discover the latest trends with up to 50% off on selected fashion items.</p>
<button>Shop Now</button>
        </div>
    <div class="hero-image">
<img src="https://images.unsplash.com/photo-1678884399113-0a2b079a31f5?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8Y2xvdGhpbmclMjBtb2RlbHxlbnwwfHwwfHx8MA%3D%3D">
</div>
    </section>
</body>
</html>
