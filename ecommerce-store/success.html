<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Success - ShopSphere</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .success-icon {
      font-size: 60px;
      color: #28a745;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    p {
      color: #555;
      margin: 8px 0;
    }

    .info {
      margin: 20px 0;
      text-align: left;
      background: #f0f4ff;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="success-icon">✅</div>
    <h1>Order Placed Successfully</h1>
    <p>Thank you for shopping with ShopSphere!</p>

    <div class="info">
      <p><strong>Order ID:</strong> <span id="orderId"></span></p>
      <p><strong>Estimated Delivery:</strong> <span id="deliveryDate"></span></p>
    </div>

    <a href="index.html" class="btn">Continue Shopping</a>
  </div>

  <script>
    // Generate fake order ID
    const orderId = "SS-" + Math.floor(100000 + Math.random() * 900000);

    // Delivery date (5–7 days from now)
    const today = new Date();
    const deliveryDays = 5 + Math.floor(Math.random() * 3);
    const deliveryDate = new Date(today.setDate(today.getDate() + deliveryDays));

    document.getElementById("orderId").textContent = orderId;
    document.getElementById("deliveryDate").textContent =
      deliveryDate.toDateString();

    // Store for future use (optional)
    localStorage.setItem("lastOrderId", orderId);
  </script>

</body>
</html>
